    - วิทยาลัยการศึกษาและการจัดการทะเล
    - วิทยาลัยนานาชาติเทคโนโลยีดิจิทัล
    - สถาบันนโยบายสาธารณะ
    - สถาบันวิศวกรรมชีวการแพทย์
