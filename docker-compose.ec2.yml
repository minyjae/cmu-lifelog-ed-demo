name: cmu-lifelong-ed-prod

services:
  postgres:
    image: postgres:15
    container_name: cmu_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-minyjae/cmu-lifelong-ed-backend:latest}
    container_name: cmu_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      APP_PREFIX: /queue-doc-api
      APP_URL: ${APP_URL}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "24h"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTO_MIGRATE: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    image: ${FRONTEND_IMAGE:-minyjae/cmu-lifelong-ed-frontend:latest}
    container_name: cmu_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # INTERNAL_API_URL ใช้ชื่อ service "backend" ใน Docker network (server-side เท่านั้น)
      INTERNAL_API_URL: http://backend:8080/queue-doc-api/api
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
